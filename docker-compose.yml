version: '3.8'

services:
  # Go 后端服务
  backend:
    build:
      context: .
      dockerfile: backend-trpc/Dockerfile
    container_name: aiminiprogram-backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - GIN_MODE=release
    volumes:
      # 挂载数据目录（可选，用于持久化）
      - ./backend/data:/root/data:ro
    networks:
      - aiminiprogram-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # 可选：PostgreSQL 数据库（如果需要从 JSON 迁移到数据库）
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: aiminiprogram-postgres
  #   environment:
  #     POSTGRES_USER: aimini
  #     POSTGRES_PASSWORD: aimini123
  #     POSTGRES_DB: aiminiprogram
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - aiminiprogram-network

  # 可选：Redis 缓存
  # redis:
  #   image: redis:7-alpine
  #   container_name: aiminiprogram-redis
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - aiminiprogram-network

networks:
  aiminiprogram-network:
    driver: bridge

